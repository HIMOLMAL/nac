<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HIV Awareness</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.container-box {
    max-width: 1100px;
    margin: 30px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
}

.logo {
    max-height: 60px;
}

.section-title {
    background: #198754;
    color: white;
    padding: 6px;
    margin-bottom: 10px;
    font-weight: bold;
}

.table-container {
    overflow-x: auto;
}

/* Make table text smaller and padding tighter */
th, td {
    text-align: center;
    font-size: 12px;      /* slightly smaller text */
    padding: 0.3rem;      /* reduce padding for tighter columns */
    white-space: nowrap;   /* prevent text wrapping */
}

/* Inputs inside table cells */
input {
    width: 50px;          /* smaller fixed width */
    padding: 2px 4px;     /* reduce input padding */
    font-size: 12px;      /* smaller font to fit */
    box-sizing: border-box; /* ensures padding doesn't expand width */
}

/* Make the first column wider for indicators */
table.table td:first-child, table.table th:first-child {
    min-width: 120px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container-box">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <img src="images/emblem.png" alt="Emblem" class="logo">
        <h5>Referrals</h5>
        <img src="images/nac.jpg" alt="NAC" class="logo">
    </div>

    <div class="section-title">Indicator</div>

    <div class="table-container">
<table class="table table-bordered">

    <!-- HEADER -->
    <thead>
        <tr class="table-success">
            <th rowspan="2">Indicator</th>

            <th colspan="6">0 - 14</th>
            <th colspan="6">15 - 24</th>
            <th colspan="6">25 - 34</th>
            <th colspan="6">35 - 49</th>
            <th colspan="6">50+</th>
        </tr>

        <tr class="table-success">
            <!-- Repeat genders for each age group -->
            <!-- 5 groups × 6 genders -->

            <!-- 0-14 -->
            <th>M</th><th>F</th><th>TG</th><th>MSM</th><th>MSW</th><th>FSW</th>

            <!-- 15-24 -->
            <th>M</th><th>F</th><th>TG</th><th>MSM</th><th>MSW</th><th>FSW</th>

            <!-- 25-34 -->
            <th>M</th><th>F</th><th>TG</th><th>MSM</th><th>MSW</th><th>FSW</th>

            <!-- 35-49 -->
            <th>M</th><th>F</th><th>TG</th><th>MSM</th><th>MSW</th><th>FSW</th>

            <!-- 50+ -->
            <th>M</th><th>F</th><th>TG</th><th>MSM</th><th>MSW</th><th>FSW</th>
        </tr>
    </thead>

  <tbody id="tableBody">

       
        </tr>


            </tbody>

        </table>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="saveData()">Save</button>
        <button class="btn btn-secondary w-100" onclick="goBack()">Back</button>
        <Button class="btn btn-secondary w-100" onclick="next()">Next</Button>
    </div>

    <p id="msg" class="text-success mt-2"></p>

</div>

<script>

  function saveData() {

    const headerId = localStorage.getItem("headerId");
    const parsedHeaderId = parseInt(headerId);

    if (!headerId || headerId === "undefined" || isNaN(parsedHeaderId)) {
        alert("Invalid headerId. Please go back.");
        return;
    }

    const inputs = document.querySelectorAll("input[data-indicator]");
    const dataList = [];

    inputs.forEach(input => {

        const value = parseInt(input.value);

        // skip empty or zero values
        if (isNaN(value) || value <= 0) return;

        const indicator = input.dataset.indicator;
        const age = input.dataset.age;
        const gender = input.dataset.gender;

        dataList.push({
            headerId: parsedHeaderId,
            programArea: "Referrals",
            indicator: indicator,
            ageGroup: age,
            gender: gender,
            value: value
        });
    });

    console.log("FINAL REFERRALS PAYLOAD:", JSON.stringify(dataList, null, 2));

    fetch("http://localhost:8080/api/report-data/save-all", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(dataList)
    })
    .then(res => res.json())
    .then(data => {
        console.log("Saved:", data);
        alert("Referral data saved successfully!");
    })
    .catch(err => {
        console.error(err);
        alert("Error saving data!");
    });
}

const ages = ["0-14", "15-24", "25-34", "35-49", "50+"];
const genders = ["M", "F", "TG", "MSM", "MSW", "FSW"];

const indicators = [
    "No. of people referred for GBV services",
    "No. of people referred for PEP",
    "No. of people referred for VCT/HCT",
    "No. of people referred for legal services",
    "No. of people referred for TB clinic",
    "No. of people referred for family planning",
    "No. of people referred for PrEP",
    "No. of people referred for STI"
];

function generateCells(indicator) {
    let html = "";

    ages.forEach(age => {
        genders.forEach(gender => {
            html += `
                <td>
                    <input 
                        type="number"
                        min="0"
                        data-indicator="${indicator}"
                        data-age="${age}"
                        data-gender="${gender}"
                    />
                </td>
            `;
        });
    });

    return html;
}

// BUILD TABLE
function buildTable() {
    const tbody = document.getElementById("tableBody");

    indicators.forEach(indicator => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td style="text-align:left; font-weight:bold;">
                ${indicator}
            </td>
            ${generateCells(indicator)}
        `;

        tbody.appendChild(row);
    });
}

buildTable();

// ✅ BACK BUTTON
function goBack() {
    window.location.href = "hivawareness.html";
}

// ✅ NEXT BUTTON
function next() {

    const headerId = localStorage.getItem("headerId");

    if (!headerId) {
        alert("Please save the Reporting Header first!");
        return;
    }

    window.location.href = "gbv.html";

  }




</script>
</body>
</html>
