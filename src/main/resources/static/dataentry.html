<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f5f7fa;
}

.container-box {
    max-width: 900px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
}

.logo {
    max-height: 70px;
}

.section-title {
    background: #198754;
    color: white;
    padding: 6px;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container-box">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <img src="images/emblem.png" class="logo">
        <img src="images/nac.jpg" class="logo">
    </div>

    <div class="text-center mb-4">
        <h5>HPDCT Data Entry</h5>
    </div>

    <!-- ================= REPORTING HEADER ================= -->
    <div class="section-title">Reporting Header</div>

    <form id="headerForm">
        <div class="row g-3">

            <div class="col-md-4">
                <label>Type of Agency</label>
                <input id="typeOfAgency" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Type of Service</label>
                <input id="typeOfService" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Site Name</label>
                <input id="siteName" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Province</label>
                <input id="province" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>District</label>
                <input id="district" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>LLG</label>
                <input id="llg" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Date of Entry</label>
                <input type="date" id="reportDate" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Contact Number</label>
                <input id="contactNumber" class="form-control" required>
            </div>

            <div class="col-md-4">
                <label>Reporting Month</label>
                <input id="reportingMonth" class="form-control" required>
            </div>

            <input type="hidden" id="status" value="PENDING">

            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">
                    Save Header
                </button>
            </div>

        </div>
    </form>

    <p id="headerMsg" class="text-success mt-2"></p>

    <!-- ================= AREA SECTION ================= -->
    <div id="areaSection" class="mt-4">

        <div class="section-title">Select Reporting Area</div>

        <div class="row g-3 mt-2">
            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="startHIV()">
                    Start HIV Awareness Entry
                </button>
            </div>
        </div>

    </div>

</div>

<script>
localStorage.removeItem("headerId");

let db;
let headerId = null;

// IndexedDB
const request = indexedDB.open("nac_db_offline", 1);

request.onupgradeneeded = function (event) {
    db = event.target.result;

    let store = db.createObjectStore("report_data", {
        keyPath: "id",
        autoIncrement: true
    });

    store.createIndex("synced", "synced", { unique: false });
    store.createIndex("date", "date", { unique: false });
};

request.onsuccess = function (event) {
    db = event.target.result;
};

// ================= SAVE HEADER =================
document.getElementById("headerForm").addEventListener("submit", function (e) {
    e.preventDefault();

    document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", saveDraft);
});

    const user = JSON.parse(localStorage.getItem("user"));

    if (!user || !user.userId) {
        alert("User session invalid. Please login again.");
        return;
    }

    const userId = user.userId;

    fetch("http://localhost:8080/api/reporting-header/create/" + userId, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            reportDate: document.getElementById("reportDate").value,
            typeOfAgency: document.getElementById("typeOfAgency").value,
            typeOfService: document.getElementById("typeOfService").value,
            siteName: document.getElementById("siteName").value,
            province: document.getElementById("province").value,
            district: document.getElementById("district").value,
            llg: document.getElementById("llg").value,
            contactNumber: document.getElementById("contactNumber").value,
            reportingMonth: document.getElementById("reportingMonth").value,
            status: "PENDING",
            submittedAt: new Date().toISOString()
        })
    })
    .then(res => res.json())
    .then(data => {

        localStorage.removeItem("report_draft");

        if (!data || !data.id) {
            alert("Header save failed! No ID returned.");
            return;
        }

        headerId = data.id;
        localStorage.setItem("headerId", headerId);
        localStorage.setItem("reportStatus", "PENDING");


        document.getElementById("headerMsg").innerText =
            "Reporting Header saved successfully. You may now proceed to Program Areas.";
    })
    .catch(error => {
        console.error("Error saving header:", error);
    });
});

// ================= NAVIGATION =================
function startHIV() {
    const headerId = localStorage.getItem("headerId");

    if (!headerId || headerId === "undefined") {
        alert("Please save header first.");
        return;
    }

    window.location.href = "hivawareness.html?headerId=" + headerId;
}

function saveDraft() {
    const draft = {
        typeOfAgency: document.getElementById("typeOfAgency").value,
        typeOfService: document.getElementById("typeOfService").value,
        siteName: document.getElementById("siteName").value,
        province: document.getElementById("province").value,
        district: document.getElementById("district").value,
        llg: document.getElementById("llg").value,
        contactNumber: document.getElementById("contactNumber").value,
        reportingMonth: document.getElementById("reportingMonth").value,
        reportDate: document.getElementById("reportDate").value
    };

    localStorage.setItem("report_draft", JSON.stringify(draft));
}

// ================= OFFLINE STORAGE =================
function saveOffline(data) {
    if (!db) {
        alert("Database not ready yet ⏳");
        return;
    }

    const tx = db.transaction("report_data", "readwrite");
    const store = tx.objectStore("report_data");

    data.synced = false;
    store.add(data);
}

window.onload = function () {

    const draft = localStorage.getItem("report_draft");

    if (draft) {
        const data = JSON.parse(draft);

        document.getElementById("typeOfAgency").value = data.typeOfAgency || "";
        document.getElementById("typeOfService").value = data.typeOfService || "";
        document.getElementById("siteName").value = data.siteName || "";
        document.getElementById("province").value = data.province || "";
        document.getElementById("district").value = data.district || "";
        document.getElementById("llg").value = data.llg || "";
        document.getElementById("contactNumber").value = data.contactNumber || "";
        document.getElementById("reportingMonth").value = data.reportingMonth || "";
        document.getElementById("reportDate").value = data.reportDate || "";
    }
};
</script>

</body>
</html>
