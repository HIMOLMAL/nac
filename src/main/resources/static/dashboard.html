<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #f5f7fa;
}
.card {
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">📊 M&E Dashboard</h2>

    <!-- 🔢 SUMMARY CARDS -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Males</h5>
                <h2 id="maleCount">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Females</h5>
                <h2 id="femaleCount">0</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Transgender</h5>
                <h2 id="tgCount">0</h2>
            </div>
        </div>
    </div>

    <!-- 📊 CHARTS -->
    <div class="row">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>Gender Distribution</h5>
                <canvas id="genderChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>Province Distribution</h5>
                <canvas id="provinceChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card p-3 mt-4">
        <h5>Monthly Trend</h5>
        <canvas id="monthlyChart"></canvas>
    </div>

</div>

<script>
const API = "http://localhost:8080/api/dashboard";

// 🔢 LOAD SUMMARY
async function loadSummary() {
    const res = await fetch(API + "/summary");
    const data = await res.json();

    document.getElementById("maleCount").innerText = data.male;
    document.getElementById("femaleCount").innerText = data.female;
    document.getElementById("tgCount").innerText = data.tg;

    new Chart(document.getElementById("genderChart"), {
        type: 'pie',
        data: {
            labels: ['Male', 'Female', 'TG'],
            datasets: [{
                data: [data.male, data.female, data.tg]
            }]
        }
    });
}

// 🗺️ LOAD PROVINCE DATA
async function loadProvince() {
    const res = await fetch(API + "/province");
    const data = await res.json();

    const labels = data.map(d => d.province);
    const values = data.map(d => d.total);

    new Chart(document.getElementById("provinceChart"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: "Total",
                data: values
            }]
        }
    });
}

// 📅 LOAD MONTHLY DATA
async function loadMonthly() {
    const res = await fetch(API + "/monthly");
    const data = await res.json();

    const labels = data.map(d => "Month " + d.month);
    const values = data.map(d => d.total);

    new Chart(document.getElementById("monthlyChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "Monthly Data",
                data: values
            }]
        }
    });
}

// 🚀 INIT
loadSummary();
loadProvince();
loadMonthly();

</script>

</body>
</html>
