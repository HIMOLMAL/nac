<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f5f7fa; }
        .box {
            max-width: 400px;
            margin: 60px auto;
            padding: 30px;
            background: #fff;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box text-center">
    <h4>Forgot Password</h4>

    <form id="forgotForm">
        <input type="email" id="email" class="form-control mb-3" placeholder="Enter your email" required>
        <button class="btn btn-warning w-100">Send Reset Link</button>
    </form>

    <p id="msg" class="mt-3"></p>

    <a href="/login.html">Back to Login</a>
</div>

<script>
document.getElementById("forgotForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("http://localhost:8080/api/auth/forgot-password", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("msg").innerText = "Reset link sent!";
    })
    .catch(() => {
        document.getElementById("msg").innerText = "Error sending email";
    });
});
</script>

</body>
</html>
